<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>整理 — Murmur</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f8f9fa; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px 12px; }
  h1 { font-size: 1.4rem; font-weight: 600; color: #1a1a1a; margin-bottom: 16px; }
  .nav { width: 100%; max-width: 640px; text-align: left; margin-bottom: 12px; }
  .nav a { color: #888; font-size: 0.85rem; text-decoration: none; }
  .toolbar { width: 100%; max-width: 640px; display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 6px; align-items: center; }
  .toolbar button { padding: 10px 16px; background: #4f8ef7; color: white; border: none; border-radius: 10px; font-size: 0.9rem; font-weight: 600; cursor: pointer; }
  .toolbar button.secondary { background: white; color: #4f8ef7; border: 1px solid #c5d8f7; }
  button:disabled { opacity: 0.5; cursor: default; }
  #progress { width: 100%; max-width: 640px; font-size: 0.82rem; color: #999; margin-bottom: 12px; min-height: 1.2em; }
  .item { background: white; border-radius: 14px; padding: 14px; width: 100%; max-width: 640px; margin-bottom: 10px; box-shadow: 0 1px 6px rgba(0,0,0,0.05); overflow: hidden; }
  .item .row1 { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; margin-bottom: 8px; }
  .item input[type="checkbox"] { width: 18px; height: 18px; flex-shrink: 0; }
  select { padding: 8px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 16px; background: white; }
  input[type="date"] { padding: 8px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 16px; background: white; max-width: 160px; }
  .label-sm { font-size: 0.78rem; color: #999; }
  .skip { font-size: 0.82rem; color: #aaa; cursor: pointer; margin-left: auto; padding: 4px; }
  .orig { font-size: 0.85rem; color: #999; white-space: pre-wrap; word-break: break-word; max-height: 90px; overflow-y: auto; background: #fafafa; border-radius: 8px; padding: 8px 10px; margin-bottom: 8px; }
  textarea { width: 100%; padding: 10px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 16px; line-height: 1.6; min-height: 110px; resize: vertical; outline: none; margin-top: 4px; }
  textarea:focus { border-color: #4f8ef7; }
  .tags-input { width: 100%; padding: 10px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 16px; margin-top: 4px; outline: none; }
  .terms { font-size: 0.8rem; color: #777; margin-top: 8px; word-break: break-word; }
  #empty { color: #999; font-size: 0.9rem; margin-top: 30px; }
  #applybar { position: sticky; bottom: 12px; width: 100%; max-width: 640px; display: none; }
  #applybar button { width: 100%; padding: 14px; background: #4f8ef7; color: white; border: none; border-radius: 12px; font-size: 1rem; font-weight: 600; cursor: pointer; box-shadow: 0 4px 16px rgba(79,142,247,0.4); }
</style>
</head>
<body>
<h1>整理旧记录</h1>
<div class="nav"><a href="/">← 返回</a></div>
<div class="toolbar">
  <button id="scan-btn" onclick="scan(false)">扫描一批</button>
  <button id="scan-all-btn" class="secondary" onclick="scan(true)">全部扫描</button>
  <button id="stop-btn" class="secondary" style="display:none;" onclick="stopScan()">停止</button>
</div>
<div id="progress"></div>
<div id="list"></div>
<div id="empty" style="display:none;">暂无待确认项</div>
<div id="applybar"><button onclick="applySelected()">应用选中</button></div>
<script>
let pollTimer = null;

async function scan(continuous) {
  setScanButtons(true);
  try {
    const resp = await fetch('/api/organize/scan', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ continuous }),
    });
    const data = await resp.json();
    if (!data.ok) { alert(data.error); setScanButtons(false); return; }
    if (data.message) { document.getElementById('progress').textContent = data.message; setScanButtons(false); return; }
    poll();
  } catch (e) { alert(e.message); setScanButtons(false); }
}

async function stopScan() {
  await fetch('/api/organize/stop', { method: 'POST' });
}

function setScanButtons(running) {
  document.getElementById('scan-btn').disabled = running;
  document.getElementById('scan-all-btn').disabled = running;
  document.getElementById('stop-btn').style.display = running ? 'inline-block' : 'none';
}

async function poll() {
  const resp = await fetch('/api/organize/list');
  const data = await resp.json();
  render(data);
  const s = data.scan;
  const prog = document.getElementById('progress');
  if (s.running) {
    setScanButtons(true);
    prog.textContent = `${s.done}/${s.total}，余 ${s.remaining}`;
    pollTimer = setTimeout(poll, 4000);
  } else {
    setScanButtons(false);
    prog.textContent = s.error ? ('出错：' + s.error) : (s.total ? `完成，余 ${s.remaining}` : '');
  }
}

function render(data) {
  const list = document.getElementById('list');
  const items = data.proposals;
  document.getElementById('empty').style.display = items.length ? 'none' : 'block';
  document.getElementById('applybar').style.display = items.length ? 'block' : 'none';
  list.innerHTML = items.map(p => {
    const typeNames = { diary: '日记', note: '笔记', password: '密码', other: '不确定' };
    let body = '';
    if (p.type === 'diary' && (p.entries || []).length) {
      body = p.entries.map((e, i) =>
        `<div class="entry" data-idx="${i}">
          <input type="date" class="entry-date" value="${e.date || ''}" style="margin-top:6px;">
          <textarea class="entry-text">${escapeHtml(e.text)}</textarea>
        </div>`).join('');
    } else if (p.type === 'note' || p.type === 'password') {
      body = `<input type="text" class="tags-input" id="tags-${p.id}" value="${(p.tags||[]).map(escapeHtml).join(' ')}" placeholder="标签">`;
    }
    return `<div class="item" data-id="${p.id}">
      <div class="row1">
        <input type="checkbox" id="ck-${p.id}" ${p.type !== 'other' ? 'checked' : ''}>
        <select id="type-${p.id}">
          ${Object.entries(typeNames).map(([k,v]) => `<option value="${k}" ${k===p.type?'selected':''}>${v}</option>`).join('')}
        </select>
        <span class="label-sm">${p.current_date || ''}${(p.entries||[]).length > 1 ? `　拆 ${p.entries.length} 天` : ''}</span>
        <span class="skip" onclick="skip(${p.id})">✕</span>
      </div>
      <div class="orig">${escapeHtml(p.content)}</div>
      ${body}
      ${p.terms && p.terms.length ? `<div class="terms" data-terms="${p.terms.map(escapeHtml).join('、')}">词表：${p.terms.map(escapeHtml).join('、')}</div>` : ''}
    </div>`;
  }).join('');
}

function escapeHtml(s) { const el = document.createElement('span'); el.textContent = s || ''; return el.innerHTML; }

async function skip(id) {
  await fetch('/api/organize/skip', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ id }) });
  poll();
}

async function applySelected() {
  const items = [...document.querySelectorAll('.item')].filter(el =>
    document.getElementById('ck-' + el.dataset.id).checked
  ).map(el => {
    const id = el.dataset.id;
    const entries = [...el.querySelectorAll('.entry')].map(en => ({
      date: en.querySelector('.entry-date').value || null,
      text: en.querySelector('.entry-text').value,
    }));
    const tagsEl = document.getElementById('tags-' + id);
    const termsEl = el.querySelector('.terms');
    return {
      id: Number(id),
      type: document.getElementById('type-' + id).value,
      entries,
      tags: tagsEl ? tagsEl.value.split(/[\s,，]+/).filter(Boolean) : [],
      terms: termsEl ? termsEl.dataset.terms.split('、').filter(Boolean) : [],
    };
  });
  if (!items.length) { alert('未选中'); return; }
  if (!confirm(`修改 ${items.length} 条？`)) return;
  const resp = await fetch('/api/organize/apply', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ items }),
  });
  const data = await resp.json();
  alert(data.ok ? `已应用 ${data.applied} 条` : `部分失败：\n${(data.errors||[]).join('\n')}`);
  poll();
}

poll();
</script>
</body>
</html>
