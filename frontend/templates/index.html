<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#4f8ef7">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Murmur">
<link rel="manifest" href="/static/manifest.json">
<link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
<title>Murmur</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f8f9fa; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 24px 16px; }
  h1 { font-size: 1.5rem; font-weight: 600; color: #1a1a1a; margin-bottom: 4px; }
  .sub { color: #888; font-size: 0.9rem; margin-bottom: 16px; }
  .card { background: white; border-radius: 16px; padding: 20px; width: 100%; max-width: 520px; box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
  label { display: block; font-size: 0.85rem; color: #555; margin-bottom: 6px; }
  input[type="date"] { width: 100%; padding: 10px 12px; border: 1px solid #e0e0e0; border-radius: 10px; font-size: 1rem; margin-bottom: 14px; outline: none; }
  input[type="date"]:focus { border-color: #4f8ef7; }
  textarea { width: 100%; padding: 12px; border: 1px solid #e0e0e0; border-radius: 10px; font-size: 1rem; resize: vertical; min-height: 160px; outline: none; line-height: 1.6; }
  textarea:focus { border-color: #4f8ef7; }
  button { width: 100%; margin-top: 14px; padding: 14px; background: #4f8ef7; color: white; border: none; border-radius: 12px; font-size: 1.05rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
  button:hover { background: #3a7ae0; }
  button:disabled { background: #aac6fb; cursor: default; }
  #result { margin-top: 16px; padding: 14px; border-radius: 12px; font-size: 0.95rem; line-height: 1.6; display: none; white-space: pre-wrap; }
  #result.success { background: #edf7f0; color: #2e7d52; border: 1px solid #b7e4c7; }
  #result.error { background: #fff0f0; color: #c0392b; border: 1px solid #f5c6cb; }
  .nav { width: 100%; max-width: 520px; text-align: right; margin-bottom: 12px; }
  .nav a { color: #888; font-size: 0.85rem; text-decoration: none; }
  .nav a:hover { color: #4f8ef7; }
  #statusbar { width: 100%; max-width: 520px; margin-bottom: 12px; font-size: 0.85rem; color: #777; }
  #statusbar .chips { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 8px; }
  .chip { padding: 6px 12px; border-radius: 999px; background: #fff3e0; color: #b06a00; border: 1px solid #ffd699; font-size: 0.85rem; cursor: pointer; user-select: none; }
  .chip:hover { background: #ffe6c2; }
  .chip.active { background: #4f8ef7; color: white; border-color: #4f8ef7; }
  #draftbar { width: 100%; max-width: 520px; margin-bottom: 12px; display: none; }
  .draft { background: #fffbe8; border: 1px solid #f0e0a0; border-radius: 10px; padding: 10px 12px; margin-bottom: 8px; font-size: 0.85rem; color: #7a6520; display: flex; align-items: center; gap: 8px; }
  .draft .text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: pointer; }
  .draft .del { cursor: pointer; color: #bba; padding: 2px 6px; }
  .draft .del:hover { color: #c0392b; }
  #jobs { width: 100%; max-width: 520px; margin-top: 16px; }
  #jobs h2 { font-size: 0.85rem; font-weight: 600; color: #999; margin-bottom: 8px; }
  .job { background: white; border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; font-size: 0.88rem; box-shadow: 0 1px 6px rgba(0,0,0,0.05); }
  .job .head { display: flex; align-items: center; gap: 8px; color: #555; cursor: pointer; }
  .job .icon { flex-shrink: 0; }
  .job .snippet { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #888; }
  .job .detail { display: none; margin-top: 10px; padding-top: 10px; border-top: 1px solid #f0f0f0; color: #555; line-height: 1.6; white-space: pre-wrap; }
  .job.open .detail { display: block; }
  .job .err { color: #c0392b; }
  .spin { display: inline-block; animation: spin 1.2s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<h1>Murmur</h1>
<p class="sub">今天想记录什么？</p>
<div class="nav"><a href="/organize">🔧 整理旧记录</a>　<a href="/settings">⚙ 设置</a></div>
<div id="statusbar">正在读取记录状态…</div>
<div id="draftbar"></div>
<div class="card">
  <label for="date">默认日期（口述中提到的日期优先；一次可以说好几天的内容）</label>
  <input type="date" id="date" value="{{ today }}">
  <label for="content">内容（语音输入或手动输入）</label>
  <textarea id="content" placeholder="说说今天发生了什么……也可以接着说：昨天……前天……"></textarea>
  <button id="btn" onclick="submit()">交给 AI 整理并发布</button>
  <div id="result"></div>
</div>
<div id="jobs"></div>
<script>
let pollTimer = null;

async function loadStatus() {
  const bar = document.getElementById('statusbar');
  try {
    const resp = await fetch('/api/status');
    const data = await resp.json();
    if (!data.ok) { bar.textContent = data.error || ''; return; }
    let html = data.last_date ? `上次记录：${data.last_date}` : '还没有任何记录';
    const missing = data.missing_days.filter(d => d !== data.today);
    if (missing.length) {
      html += `　·　近两周缺 ${missing.length} 天`;
      html += '<div class="chips">' + missing.map(d =>
        `<span class="chip" data-date="${d}" onclick="pickDate(this)">${d.slice(5).replace('-', '月')}日</span>`
      ).join('') + '</div>';
    } else {
      html += '　·　近两周无空缺 ✓';
    }
    bar.innerHTML = html;
  } catch (e) { bar.textContent = ''; }
}

async function loadDrafts() {
  const bar = document.getElementById('draftbar');
  try {
    const resp = await fetch('/api/drafts');
    const data = await resp.json();
    if (!data.ok || !data.drafts.length) { bar.style.display = 'none'; return; }
    bar.innerHTML = data.drafts.map(d =>
      `<div class="draft">
        <span class="text" onclick="restoreDraft(${d.id}, this)" data-date="${d.date}" data-content="${escapeAttr(d.content)}">📝 未发布草稿 ${d.date}：${escapeHtml(d.content.slice(0, 30))}…（点击恢复重试）</span>
        <span class="del" onclick="deleteDraft(${d.id})">✕</span>
      </div>`).join('');
    bar.style.display = 'block';
  } catch (e) { bar.style.display = 'none'; }
}

function escapeHtml(s) { const el = document.createElement('span'); el.textContent = s; return el.innerHTML; }
function escapeAttr(s) { return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

let pendingDraftId = null;

function restoreDraft(id, el) {
  document.getElementById('content').value = el.dataset.content;
  document.getElementById('date').value = el.dataset.date;
  // 不立即删除草稿，等发布成功后再删，防止误触丢内容
  pendingDraftId = id;
  showResult('success', '草稿已填入输入框，发布成功后会自动清除');
  window.scrollTo(0, 0);
}

async function deleteJob(id) {
  await fetch('/api/jobs/delete', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ id }) });
  loadJobs();
}

async function deleteDraft(id) {
  await fetch('/api/drafts/delete', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ id }) });
  loadDrafts();
}

function pickDate(el) {
  document.getElementById('date').value = el.dataset.date;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('content').focus();
}

async function submit() {
  const content = document.getElementById('content').value.trim();
  const date = document.getElementById('date').value;
  if (!content) { showResult('error', '请先输入内容'); return; }
  const btn = document.getElementById('btn');
  btn.disabled = true;
  try {
    const resp = await fetch('/api/submit', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content, date }),
    });
    const data = await resp.json();
    if (data.ok) {
      document.getElementById('content').value = '';
      if (pendingDraftId) { deleteDraft(pendingDraftId); pendingDraftId = null; }
      showResult('success', '✓ 已提交后台整理，可以继续说下一条。进度见下方任务列表。');
      loadJobs();
    } else {
      showResult('error', data.error || '未知错误');
    }
  } catch (e) { showResult('error', '请求失败：' + e.message); }
  btn.disabled = false;
}

async function loadJobs() {
  const box = document.getElementById('jobs');
  try {
    const resp = await fetch('/api/jobs');
    const data = await resp.json();
    if (!data.ok || !data.jobs.length) { box.innerHTML = ''; return; }
    const open = new Set([...document.querySelectorAll('.job.open')].map(el => el.dataset.id));
    box.innerHTML = '<h2>任务</h2>' + data.jobs.map(j => {
      let icon, summary, detail = '';
      if (j.status === 'pending' || j.status === 'processing') {
        icon = '<span class="spin">⏳</span>'; summary = 'AI 整理中…';
      } else if (j.status === 'done') {
        icon = '✅';
        summary = j.result.map(r => `${r.date}${r.action === 'merged' ? '（已合并）' : ''}`).join('、') + ' 已发布';
        detail = j.result.map(r => `【${r.date}】\n${r.text}`).join('\n\n');
      } else {
        icon = '❌'; summary = '失败';
        detail = `<span class="err">${escapeHtml(j.error || '')}</span>`;
      }
      const delBtn = (j.status === 'done' || j.status === 'error')
        ? `<span class="del" onclick="event.stopPropagation(); deleteJob(${j.id})" style="cursor:pointer;color:#ccc;padding:0 4px;">✕</span>` : '';
      return `<div class="job ${open.has(String(j.id)) ? 'open' : ''}" data-id="${j.id}">
        <div class="head" onclick="this.parentElement.classList.toggle('open')">
          <span class="icon">${icon}</span><span>${summary}</span>
          <span class="snippet">${escapeHtml(j.content.slice(0, 20))}</span>${delBtn}
        </div>
        <div class="detail">${detail || escapeHtml(j.content)}</div>
      </div>`;
    }).join('');
    const hasActive = data.jobs.some(j => j.status === 'pending' || j.status === 'processing');
    clearTimeout(pollTimer);
    if (hasActive) {
      pollTimer = setTimeout(loadJobs, 4000);
    } else {
      loadStatus(); loadDrafts();
    }
  } catch (e) { /* 忽略轮询错误 */ }
}

function showResult(type, msg) {
  const el = document.getElementById('result');
  el.className = type; el.style.display = 'block'; el.textContent = msg;
  if (type === 'success') setTimeout(() => { el.style.display = 'none'; }, 6000);
}

loadStatus();
loadDrafts();
loadJobs();
</script>
</body>
</html>
